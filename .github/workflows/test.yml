name: Test

on:
  push:
    branches:
      - 'master'
    tags:
      - '*'
  pull_request:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Install tree-sitter
        run: |
          sudo apt update
          sudo apt install -y wget
          wget https://github.com/tree-sitter/tree-sitter/releases/download/v0.25.0/tree-sitter-linux-x64.gz
          gunzip tree-sitter-linux-x64.gz
          chmod +x tree-sitter-linux-x64
          sudo mv tree-sitter-linux-x64 /usr/local/bin/tree-sitter
          tree-sitter --version
          mkdir ~/src/
      - name: Init tree-sitter
        run: |
          tree-sitter init-config
          cat ~/.config/tree-sitter/config.json
      - name: install tree-sitter-r
        run: |
          git clone https://github.com/r-lib/tree-sitter-r ~/src/tree-sitter-r
          cd ~/src/tree-sitter-r
          tree-sitter generate 
      - name: install tree-sitter-python
        run: |
          git clone  https://github.com/tree-sitter/tree-sitter-python ~/src/tree-sitter-python
          cd ~/src/tree-sitter-python
          tree-sitter generate
      - name: install tree-sitter-julia
        run: |
          git clone https://github.com/tree-sitter/tree-sitter-julia ~/src/tree-sitter-julia
          cd ~/src/tree-sitter-julia
          tree-sitter generate
      - name: install tree-sitter-c
        run: |
          git clone https://github.com/tree-sitter/tree-sitter-c ~/src/tree-sitter-c
          cd ~/src/tree-sitter-c
          tree-sitter generate
      - name: install tree-sitter-csharp
        run: |
          git clone https://github.com/tree-sitter/tree-sitter-c-sharp ~/src/tree-sitter-c-sharp
          cd ~/src/tree-sitter-c-sharp
          tree-sitter generate
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Julia 1.x
        uses: julia-actions/setup-julia@v1
        with:
          version: "1"
      - uses: julia-actions/julia-buildpkg@v1
      - name: check tree-sitter languages
        run: |
          ls -al ~/src
          tree-sitter dump-languages
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_ORG_TOKEN }}
